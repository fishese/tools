name = "gpx-poi-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

# The Geoapify key is NOT stored here. Set it as a secret:
#   wrangler secret put GEOAPIFY_KEY
# For local `wrangler dev`, it is read from worker/.dev.vars instead.

# Optional: enable the hard daily cap by creating a KV namespace and
# uncommenting this block with the returned id:
#   wrangler kv namespace create COUNTER
# [[kv_namespaces]]
# binding = "COUNTER"
# id = "PASTE_KV_ID_HERE"
