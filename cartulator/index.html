<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cartulator</title>

<!-- PWA / installable offline web app -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" id="themeColor" content="#0f172a">
<link rel="icon" href="icons/favicon.png" sizes="any">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
  // Resolve theme before paint to avoid a flash of the wrong mode
  (function(){ try{
    var th = localStorage.getItem('sdc_theme');
    if(th!=='light' && th!=='dark'){
      th = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', th);
    var m = document.getElementById('themeColor');
    if(m) m.setAttribute('content', th==='light' ? '#f1f5f9' : '#0f172a');
  }catch(e){} })();
</script>

<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --inset:#0f172a; --inset-rgb:15,23,42;
    --text:#e2e8f0; --muted:#a3b1c2; --accent:#38bdf8; --good:#34d399;
    --warn:#fbbf24; --bad:#f87171; --onAccent:#04293a; --radius:14px;
  }
  /* light palette — applied when chosen explicitly, or by the system when no choice is saved */
  :root[data-theme="light"]{
    --bg:#f1f5f9; --panel:#ffffff; --panel2:#e9eef5; --line:#cbd5e1;
    --inset:#f8fafc; --inset-rgb:248,250,252;
    --text:#0f172a; --muted:#52617a; --accent:#0284c7; --good:#0f9d6b;
    --warn:#b45309; --bad:#dc2626; --onAccent:#ffffff;
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme="dark"]){
      --bg:#f1f5f9; --panel:#ffffff; --panel2:#e9eef5; --line:#cbd5e1;
      --inset:#f8fafc; --inset-rgb:248,250,252;
      --text:#0f172a; --muted:#52617a; --accent:#0284c7; --good:#0f9d6b;
      --warn:#b45309; --bad:#dc2626; --onAccent:#ffffff;
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); padding:16px; line-height:1.45;
  }
  .apphead{display:flex; justify-content:space-between; align-items:flex-start; gap:12px}
  h1{font-size:1.1rem; margin:0 0 2px}
  .sub{color:var(--muted); font-size:.78rem; margin:0 0 10px}
  .topbar{display:flex; flex-wrap:wrap; gap:10px; align-items:stretch; margin-bottom:14px}
  .grand{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:8px 16px; display:flex; flex-wrap:wrap; gap:18px; align-items:center; flex:1; min-width:240px;
  }
  .grand .stat .k{font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:1px}
  .grand .stat .v{font-size:1.05rem; font-weight:700}
  .v.good{color:var(--good)}
  .ctrl{flex:0 0 auto; min-width:0}
  .ctrl-field{flex:0 0 auto; min-width:0; display:flex; align-items:center; gap:6px; white-space:nowrap}
  .ctrl-field label{margin:0; font-size:.68rem; white-space:nowrap}
  .ctrl-field input[type=number]{width:64px; flex:0 0 64px; padding:4px 5px; font-size:16px; text-align:center}
  .ctrl-field select{width:auto; min-width:72px; flex:0 0 auto; padding:4px 6px; font-size:.82rem}
  .setqty-wrap{display:flex; align-items:center; gap:6px; flex:0 0 auto; margin-right:18px}
  .setqty-spin{display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:8px;
    background:var(--inset); overflow:hidden; flex:0 0 auto}
  .setqty-spin button{width:34px; height:34px; min-width:34px; padding:0; border:none; border-radius:0;
    background:transparent; color:var(--text); font-size:1.15rem; font-weight:700; line-height:1;
    display:inline-flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent}
  .setqty-spin button:hover{background:var(--panel2); filter:none}
  .setqty-spin button:active{background:var(--line)}
  .setqty{width:40px; flex:0 0 40px; background:transparent; color:var(--text); border:none;
    border-left:1px solid var(--line); border-right:1px solid var(--line); border-radius:0;
    padding:4px 2px; font-size:.95rem; text-align:center; -moz-appearance:textfield}
  .setqty::-webkit-outer-spin-button, .setqty::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .setqty-wrap label{margin:0; font-size:.78rem; color:var(--muted); text-transform:none; letter-spacing:0; white-space:nowrap}
  .bxgy{margin-top:8px; border:1px solid var(--line); border-radius:10px; background:var(--inset); overflow:hidden}
  .bxgy > summary{cursor:pointer; padding:6px 10px; font-size:.82rem; font-weight:700; color:var(--muted); list-style:none;
    display:flex; align-items:center; gap:6px; user-select:none}
  .bxgy > summary::-webkit-details-marker{display:none}
  .bxgy > summary::before{content:'▸'; font-size:.7rem; color:var(--accent)}
  .bxgy[open] > summary::before{content:'▾'}
  .bxgy-body{padding:0 10px 10px; display:flex; flex-direction:column; gap:6px}
  .bxgy-warn{color:var(--warn); font-size:.78rem; margin:0}
  .bxgy-proj{color:var(--muted); font-size:.78rem; margin:0}

  /* language segmented control */
  .langseg{display:inline-flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; flex:0 0 auto}
  .langseg button{background:transparent; border:none; border-radius:0; color:var(--muted);
    padding:6px 11px; font-size:.82rem; font-weight:700; min-width:36px; cursor:pointer}
  .langseg button + button{border-left:1px solid var(--line)}
  .langseg button.on{background:var(--accent); color:var(--onAccent)}
  .langseg button:hover:not(.on){background:var(--panel2); color:var(--text)}

  /* header right cluster + theme toggle */
  .apphead .right{display:flex; align-items:center; gap:8px; flex:0 0 auto}
  .iconbtn{display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px;
    padding:0; border-radius:999px; background:var(--panel); color:var(--text); border:1px solid var(--line); cursor:pointer}
  .iconbtn:hover{background:var(--panel2); filter:none}
  .iconbtn svg{width:18px; height:18px; display:block}

  button{
    font:inherit; cursor:pointer; border:none; border-radius:10px; padding:10px 14px;
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
  }
  button:hover{background:var(--panel2); filter:brightness(1.08)}
  button.primary{background:var(--accent); color:var(--onAccent); font-weight:700; border-color:var(--accent)}
  button.danger{background:transparent; color:var(--bad); border-color:transparent; padding:6px 8px}
  button.danger:hover{background:rgba(248,113,113,.12); filter:none}
  button.warnbtn{background:transparent; color:var(--bad); border-color:var(--line)}
  button.warnbtn:hover{background:rgba(248,113,113,.12); filter:none}
  .installbtn{border-color:var(--accent); color:var(--accent)}
  .installbtn:hover{background:rgba(56,189,248,.14); filter:none}

  /* visible keyboard focus */
  button:focus-visible, input:focus-visible, select:focus-visible,
  textarea:focus-visible, .gname:focus-visible, .setqty-spin button:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px;
  }

  .groups{display:flex; flex-direction:column; gap:10px}
  .group{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
  .ghead{display:flex; align-items:center; gap:6px; padding:5px 8px; background:var(--panel2); border-bottom:1px solid var(--line)}
  .gname{flex:1; background:transparent; border:none; color:var(--text); font-size:.95rem; font-weight:700; padding:4px}
  .gname:focus{outline:none; background:var(--inset); border-radius:8px}
  .gbody{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px}
  @media(max-width:680px){.gbody{grid-template-columns:1fr}}
  label{display:block; font-size:.78rem; color:var(--muted); margin:0 0 4px; text-transform:uppercase; letter-spacing:.03em}
  textarea{
    width:100%; min-height:100px; resize:none; overflow-y:hidden; background:var(--inset); color:var(--text);
    border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:1.05rem;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; line-height:1.5;
  }
  textarea:focus{outline:none; border-color:var(--accent)}
  .ta-wrap{position:relative}
  .fade{position:absolute; left:1px; right:1px; bottom:1px; height:80px; pointer-events:none;
    display:none; border-radius:0 0 10px 10px;
    background:linear-gradient(to bottom, rgba(var(--inset-rgb),0) 0%, rgba(var(--inset-rgb),.85) 60%, var(--inset) 100%);}
  .fade.show{display:flex; align-items:flex-end; justify-content:center}
  .fade .more{margin-bottom:8px; font-size:.8rem; font-weight:700; color:var(--accent)}
  .deal-card{background:var(--inset); border:1px solid var(--line); border-radius:10px; padding:8px}
  .row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px}
  .field{flex:1; min-width:110px}
  .deal-card .row{flex-wrap:nowrap; gap:6px; align-items:flex-end}
  .deal-card .field{min-width:0; flex:1 1 0}
  .deal-card .field-type{flex:1.15 1 0}
  .deal-card .field-amt{flex:0.85 1 0}
  .deal-card .field-start{flex:0.9 1 0}
  .deal-card label{font-size:.68rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .deal-card input[type=number], .deal-card select{
    padding:5px 6px; font-size:16px; /* 16px avoids iOS zoom */
  }
  .deal-card select{padding-right:4px}
  label{margin:0 0 2px}
  input[type=number],select{
    width:100%; background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:6px 9px; font-size:1rem;
  }
  input:focus,select:focus{outline:none; border-color:var(--accent)}
  .check{display:flex; align-items:center; gap:8px; font-size:.95rem; color:var(--text); cursor:pointer; margin-top:2px}
  .check input{width:18px; height:18px}
  .tally{margin-top:8px; border-top:1px dashed var(--line); padding-top:8px; display:flex; flex-direction:column; gap:5px}
  .line{display:flex; justify-content:space-between; gap:12px; font-size:.95rem}
  .line .lbl{color:var(--muted)}
  .line .val{font-weight:700; text-align:right}
  .big{font-size:1.15rem}
  .pill{display:inline-block; padding:2px 8px; border-radius:999px; font-size:.78rem; font-weight:700}
  .pill.short{background:rgba(251,191,36,.18); color:var(--warn)}
  .pill.met{background:rgba(52,211,153,.18); color:var(--good)}
  .hint{color:var(--muted); font-size:.78rem; margin-top:4px}
  .progress{height:8px; background:var(--panel2); border-radius:999px; overflow:hidden; margin-top:4px}
  .progress>div{height:100%; background:var(--accent); width:0%}
  .footer-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
  .note{color:var(--muted); font-size:.78rem; margin-top:8px}
  .credit{margin-top:10px; font-size:.72rem; color:var(--muted); opacity:.65; text-align:center}
  .credit a{color:inherit; text-decoration:none; border-bottom:1px dotted var(--line)}
  .credit a:hover{color:var(--accent); opacity:1}
  .toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--good); color:#04291c;
    padding:10px 18px; border-radius:10px; font-weight:700; opacity:0; pointer-events:none; transition:opacity .2s}
  .toast.show{opacity:1}
</style>
</head>

        </select>
      </div>
    </div>

  <div class="groups" id="groups"></div>

  <div class="footer-actions">
    <button class="primary" id="addGroup"></button>
    <button id="exportBtn"></button>
    <button id="copyBtn"></button>
    <button class="warnbtn" id="clearBtn"></button>
    <button class="installbtn" id="installBtn" style="display:none"></button>
  </div>
  <p class="note" id="note"></p>
  <p class="credit"><a href="../" rel="noopener">0oo.fish.oo0</a></p>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  // ---------- persistence ----------
  function save(){
    try{
      localStorage.setItem(DATA_KEY, JSON.stringify({
        state:state, seq:seq, extraType:extraType, extraValue:extraValue, extraPct:extraValue
      }));
    }catch(e){}
  }
  function load(){
    try{
      var raw = localStorage.getItem(DATA_KEY);
      if(!raw) return false;
      var d = Calc.migrateData(JSON.parse(raw));
      if(d.state && d.state.length){
        state = d.state;
        seq = d.seq || state.reduce(function(m,g){return Math.max(m, g.id||0);}, 0);
        extraType = d.extraType === 'zhe' ? 'zhe' : 'percent';
        extraValue = d.extraValue != null ? d.extraValue : '';
        return true;
      }
    }catch(e){}
    return false;
  }

  // ---------- price parsing ----------
  function parseLineValue(line){
    if(!line) return null;
    var s = line.trim();
    if(!s) return null;
    // multiplication "qty x price" only when it leads the line (avoids hijacking
    // pack sizes / dimensions like "2x500ml" or "5x7" that sit after the price)
    var mul = s.match(/^(\d+(?:\.\d+)?)\s*[*x]\s*(\d+(?:\.\d+)?)/i);
    if(mul){ return parseFloat(mul[1]) * parseFloat(mul[2]); }
    var num = s.match(/(\d+(?:\.\d+)?)/);
    if(num){ return parseFloat(num[1]); }
    return null;
  }
  function sumItems(text){
    var total = 0, count = 0;
    (text||'').split(/\r?\n/).forEach(function(l){
      var v = parseLineValue(l);
      if(v !== null && !isNaN(v)){ total += v; count++; }
    });
    return {total:total, count:count};
  }

  // ---------- discount math (delegates to CartulatorCalc) ----------
  function round2(n){ return Calc.round2(n); }
  function money(n){ return '$' + round2(n).toFixed(2); }
  function catResult(g){
    var parsed = sumItems(g.items);
    var deal = Calc.computeCategory(parsed.total, g);
    return { parsed: parsed, deal: deal };
  }
  function dealText(g){
    var parts = [];
    if(g.bxgyOn && g.bxgyBuy && g.bxgyGet) parts.push(t('dealBxgy', g.bxgyBuy, g.bxgyGet));
    if(g.threshold && g.value){
      var d = g.type==='zhe' ? t('dealZhe', g.value)
        : (g.type==='percent' ? t('dealPct', g.value) : t('dealDollar', money(g.value)));
      parts.push(g.recurring ? t('dealEvery', d, money(g.threshold)) : t('dealOver', d, money(g.threshold)));
    }
    if(!parts.length) return t('dealNone');
    return parts.join(' · ');
  }

  // ---------- rendering ----------
  var COLLAPSE_ROWS = 15;
  function autoGrow(ta){ ta.style.height='auto'; ta.style.height=(ta.scrollHeight+6)+'px'; }
  function lineCount(text){ return (text||'').split(/\r?\n/).length; }
  function expandItems(ta, fade){ autoGrow(ta); if(fade) fade.classList.remove('show'); }
  function collapseItems(ta, fade){
    var n = lineCount(ta.value);
    if(n <= COLLAPSE_ROWS){ expandItems(ta, fade); return; }
    var cs = getComputedStyle(ta);
    var lh = parseFloat(cs.lineHeight); if(isNaN(lh)) lh = parseFloat(cs.fontSize)*1.7;
    var pad = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
    ta.style.height = Math.round(pad + lh*COLLAPSE_ROWS) + 'px';
    if(fade){
      var more = fade.querySelector('.more');
      if(more) more.textContent = t('more', n - COLLAPSE_ROWS);
      fade.classList.add('show');
    }
  }

  function render(){
    groupsEl.innerHTML = '';
    state.forEach(function(g){ groupsEl.appendChild(buildGroup(g)); });
    // collapsed by default (no category focused on initial render)
    state.forEach(function(g){
      collapseItems(document.getElementById('ta-'+g.id), document.getElementById('fade-'+g.id));
    });
    updateGrand();
  }

  function buildGroup(g){
    var cr = catResult(g);
    var parsed = cr.parsed;
    var deal = cr.deal;

    var wrap = document.createElement('div');
    wrap.className = 'group';

    // header: name | set qty | remove
    var head = document.createElement('div');
    head.className = 'ghead';
    var name = document.createElement('input');
    name.className = 'gname'; name.value = g.name; name.placeholder = t('catName');
    name.setAttribute('aria-label', t('catName'));
    name.addEventListener('input', function(){ g.name = name.value; save(); });

    var sqWrap = document.createElement('div');
    sqWrap.className = 'setqty-wrap';
    var spin = document.createElement('div');
    spin.className = 'setqty-spin';
    var sq = document.createElement('input');
    sq.type = 'number'; sq.min = '1'; sq.step = '1'; sq.inputMode = 'numeric';
    sq.className = 'setqty'; sq.id = 'sq-'+g.id;
    sq.value = g.setQty == null ? 1 : g.setQty;
    sq.setAttribute('aria-label', t('setsLbl'));
    function applySetQty(n){
      n = Math.max(1, Math.floor(n) || 1);
      g.setQty = n;
      sq.value = n;
      refreshGroup(wrap, g); updateGrand();
    }
    sq.addEventListener('input', function(){
      applySetQty(sq.value === '' ? 1 : parseFloat(sq.value));
    });
    var minus = document.createElement('button');
    minus.type = 'button'; minus.textContent = '−';
    minus.setAttribute('aria-label', '−');
    minus.addEventListener('click', function(){
      applySetQty((parseFloat(g.setQty) || 1) - 1);
    });
    var plus = document.createElement('button');
    plus.type = 'button'; plus.textContent = '+';
    plus.setAttribute('aria-label', '+');
    plus.addEventListener('click', function(){
      applySetQty((parseFloat(g.setQty) || 1) + 1);
    });
    spin.appendChild(minus); spin.appendChild(sq); spin.appendChild(plus);
    var sqLab = document.createElement('label');
    sqLab.textContent = t('setsLbl');
    sqLab.htmlFor = 'sq-'+g.id;
    sqWrap.appendChild(spin); sqWrap.appendChild(sqLab);

    var del = document.createElement('button');
    del.className = 'danger'; del.textContent = t('remove');
    del.addEventListener('click', function(){
      if((g.items||'').trim() !== '' && !window.confirm(t('confirmRemove', g.name || ''))) return;
      state = state.filter(function(x){ return x.id !== g.id; }); render(); save();
    });
    head.appendChild(name); head.appendChild(sqWrap); head.appendChild(del);

    // body
    var body = document.createElement('div');
    body.className = 'gbody';

    // left: items textarea + BXGY
    var left = document.createElement('div');
    var llab = document.createElement('label'); llab.textContent = t('itemsLabel');
    llab.htmlFor = 'ta-'+g.id;
    var taWrap = document.createElement('div'); taWrap.className='ta-wrap';
    var ta = document.createElement('textarea');
    ta.id = 'ta-'+g.id;
    ta.value = g.items;
    ta.placeholder = '20\n20 cookies\n10 * 2\n10 * 2 cola\n20 for two kiwi';
    var fade = document.createElement('div'); fade.className='fade'; fade.id='fade-'+g.id;
    fade.appendChild(document.createElement('div')).className='more';
    ta.addEventListener('input', function(){
      g.items = ta.value;
      autoGrow(ta);
      refreshGroup(wrap, g);
      updateGrand();
    });
    taWrap.appendChild(ta); taWrap.appendChild(fade);
    var lc = document.createElement('div'); lc.className='hint'; lc.id='cnt-'+g.id;
    lc.textContent = t('itemsRead', parsed.count);
    left.appendChild(llab); left.appendChild(taWrap); left.appendChild(lc);
    left.appendChild(makeBxgyControls(g, wrap));

    wrap.addEventListener('focusin', function(){ expandItems(ta, fade); });
    wrap.addEventListener('focusout', function(e){
      if(!wrap.contains(e.relatedTarget)) collapseItems(ta, fade);
    });

    // right: deal + tally
    var right = document.createElement('div');
    var card = document.createElement('div'); card.className='deal-card';
    card.appendChild(makeDealControls(g, wrap));

    var tally = document.createElement('div'); tally.className='tally'; tally.id='tally-'+g.id;
    tally.appendChild(buildTally(parsed, deal, g));
    card.appendChild(tally);
    right.appendChild(card);

    body.appendChild(left); body.appendChild(right);
    wrap.appendChild(head); wrap.appendChild(body);
    return wrap;
  }

  function makeBxgyControls(g, wrap){
    var det = document.createElement('details');
    det.className = 'bxgy';
    if(g.bxgyOn) det.open = true;
    var sum = document.createElement('summary');

  function updateBxgyHints(g, warnEl, projEl){
    if(!warnEl) warnEl = document.getElementById('bxwarn-'+g.id);
    if(!projEl) projEl = document.getElementById('bxproj-'+g.id);
    if(!warnEl || !projEl) return;
    var parsed = sumItems(g.items);
    var pr = Calc.computePricing({
      itemsTotal: parsed.total, setQty: g.setQty,
      bxgyOn: g.bxgyOn, bxgyBuy: g.bxgyBuy, bxgyGet: g.bxgyGet
    });
    var buy = parseFloat(g.bxgyBuy);
    if(g.bxgyOn && pr.bxgyWarn && !isNaN(buy) && buy > 0){
      warnEl.textContent = t('bxgyWarn', buy);
      warnEl.style.display = '';
    } else {
      warnEl.textContent = '';
      warnEl.style.display = 'none';
    }
    if(g.bxgyOn && parsed.total > 0 && pr.freeSets >= 0 && !isNaN(buy) && buy > 0 && parseFloat(g.bxgyGet) > 0){
      var sets = pr.setQty + pr.freeSets;
      var each = sets > 0 ? money(pr.payBeforePromo / sets) : money(0);
      projEl.textContent = t('bxgyProj', money(pr.payBeforePromo), sets, each);
      projEl.style.display = '';
    } else {
      projEl.textContent = '';
      projEl.style.display = 'none';
    }
  }

  function makeDealControls(g, wrap){
    var box = document.createElement('div');

    var row1 = document.createElement('div'); row1.className='row';

    var f1 = document.createElement('div'); f1.className='field field-start';

    l1.id = 'thlab-'+g.id; l1.htmlFor = 'thr-'+g.id;
    var thr = document.createElement('input'); thr.type='number'; thr.min='0'; thr.step='any';
    thr.id = 'thr-'+g.id; thr.inputMode='decimal';

    thr.addEventListener('input', function(){ g.threshold = thr.value; refreshGroup(wrap, g); updateGrand(); });
    f1.appendChild(l1); f1.appendChild(thr);

    var f3 = document.createElement('div'); f3.className='field field-amt';
    var l3 = document.createElement('label'); l3.textContent=t('amount'); l3.htmlFor='val-'+g.id;
    var val = document.createElement('input'); val.type='number'; val.min='0'; val.step='any';
    val.id='val-'+g.id; val.inputMode='decimal';
    val.value=g.value;
    val.placeholder = g.type==='zhe' ? t('eg','8.5') : (g.type==='percent' ? t('eg','10') : t('eg','25'));
    val.removeAttribute('max');
    val.addEventListener('input', function(){ g.value=val.value; refreshGroup(wrap, g); updateGrand(); });
    f3.appendChild(l3); f3.appendChild(val);

    var f2 = document.createElement('div'); f2.className='field field-type';
    var l2 = document.createElement('label'); l2.textContent=t('discType'); l2.htmlFor='type-'+g.id;
    var type = document.createElement('select'); type.id='type-'+g.id;
    [['percent',t('pctOff')],['fixed',t('dollarOff')],['zhe',t('zheOff')]].forEach(function(o){
      var opt=document.createElement('option'); opt.value=o[0]; opt.textContent=o[1];
      if(g.type===o[0]) opt.selected=true; type.appendChild(opt);

    return box;

  function buildTally(parsed, deal, g){
    var frag = document.createElement('div');
    var promo = deal.promo;
    var pricing = deal.pricing;
    function line(lbl, val, cls){
      var d=document.createElement('div'); d.className='line';
      var a=document.createElement('span'); a.className='lbl'; a.innerHTML=lbl;
      var b=document.createElement('span'); b.className='val '+(cls||''); b.innerHTML=val;
      d.appendChild(a); d.appendChild(b); return d;
    }
    frag.appendChild(line(t('origTotal'), '<span class="big">'+money(deal.original)+'</span>'));

    var th = parseFloat(g.threshold);
    var payBase = pricing.payBeforePromo;
    if(!isNaN(th) && th>0){
      if(payBase >= th){
        if(g.recurring && g.type==='fixed'){
          var v = '<span class="pill met">'+t('reached')+'</span>';
          if(promo.towardNext > 0) v += ' '+t('overLast', money(promo.towardNext));
          frag.appendChild(line(t('spendPerM', money(th)), v, 'good'));
        } else if(g.type === 'fixed'){
          var v2 = '<span class="pill met">'+t('reached')+'</span>';
          if(payBase - th > 0) v2 += ' '+t('over', money(payBase - th));
          frag.appendChild(line(t('discStart', money(th)), v2, 'good'));
        } else {
          frag.appendChild(line(t('discStart', money(th)),
            '<span class="pill met">'+t('reached')+'</span>', 'good'));
        }
      } else {
        var short = th - payBase;
        frag.appendChild(line(g.recurring ? t('spendPerM', money(th)) : t('discStart', money(th)),
          '<span class="pill short">'+t('toGo', money(short))+'</span>', 'warn'));
      }
    }

    if(deal.bxgySaved > 0){
      frag.appendChild(line(t('bxgySavedLbl'), '− '+money(deal.bxgySaved), 'good'));
    }
    if(promo.qualified && promo.saved > 0){
      frag.appendChild(line(t('discApplied'), '− '+money(promo.saved), 'good'));
    }
    if(deal.bxgySaved > 0 || (promo.qualified && promo.saved > 0)){
      frag.appendChild(line(t('afterDisc'), '<span class="big">'+money(deal.final)+'</span>', 'good'));
    } else {
      frag.appendChild(line(t('totalPay'), '<span class="big">'+money(deal.final)+'</span>'));
    }

    if(g.recurring && g.type==='fixed' && !isNaN(th) && th>0 && payBase>0){
      var pct = Math.max(0, Math.min(100, (promo.towardNext/th)*100));
      frag.appendChild(line(t('towardNext', money(th)), t('leftToGo', money(promo.leftNext))));
      var prog=document.createElement('div'); prog.className='progress';
      var bar=document.createElement('div'); bar.style.width=pct.toFixed(1)+'%';
      prog.appendChild(bar); frag.appendChild(prog);
      if(promo.milestones>0){
        var h=document.createElement('div'); h.className='hint';
        h.textContent = t('milestonesSoFar', promo.milestones);
        frag.appendChild(h);
      }
    }
    return frag;
  }

  // light refresh of one group's count + tally (keeps textarea focus/cursor)
  function refreshGroup(wrap, g){
    var cr = catResult(g);
    var cnt = wrap.querySelector('#cnt-'+g.id);
    if(cnt) cnt.textContent = t('itemsRead', cr.parsed.count);
    var tally = wrap.querySelector('#tally-'+g.id);
    if(tally){ tally.innerHTML=''; tally.appendChild(buildTally(cr.parsed, cr.deal, g)); }
    updateBxgyHints(g);
    var sq = wrap.querySelector('#sq-'+g.id);
    if(sq && String(sq.value) !== String(g.setQty) && document.activeElement !== sq){
      sq.value = g.setQty == null ? 1 : g.setQty;
    }
  }

  function totals(){
    var goods=0, catSaved=0, afterCat=0;
    state.forEach(function(g){
      var cr = catResult(g);
      goods += round2(cr.deal.original);
      catSaved += round2(cr.deal.saved);
      afterCat += round2(cr.deal.final);
    });
    afterCat = round2(afterCat);
    var ex = Calc.computeExtra(afterCat, { extraType: extraType, extraValue: extraValue });
    return {
      total: round2(goods),
      catSaved: round2(catSaved),
      extraSaved: ex.extraSaved,
      extraValueUsed: ex.extraValueUsed,
      saved: round2(catSaved + ex.extraSaved),
      final: ex.final
    };
  }
  function updateGrand(){
    var x=totals();
    document.getElementById('gTotal').textContent=money(x.total);
    document.getElementById('gSaved').textContent=money(x.saved);
    document.getElementById('gFinal').textContent=money(x.final);
    save();
  }

  // ---------- actions ----------
  function addGroup(prefill){
    seq++;
    state.push(Calc.migrateGroup(Object.assign({
      id:seq, name:t('defaultCat', seq), items:'', threshold:'', type:'percent', value:'', recurring:false,
      setQty:1, bxgyOn:false, bxgyBuy:'', bxgyGet:''
    }, prefill||{})));
    render(); save();
  }

  function toast(msg){
    var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 1600);
  }

  function extraLabel(x){
    if(extraType === 'zhe') return t('dealZhe', x.extraValueUsed);
    return x.extraValueUsed + '%';
  }

  function exportExcel(){
    var rows = [[t('hCategory'),t('hItemsRead'),t('hSets'),t('hBxgy'),t('hOrig'),t('hDeal'),t('hRecurring'),t('hSaved'),t('hPay'),t('hItems')]];
    state.forEach(function(g){
      var cr = catResult(g);
      rows.push([
        g.name, cr.parsed.count, Calc.normalizeSetQty(g.setQty),
        g.bxgyOn ? t('dealBxgy', g.bxgyBuy, g.bxgyGet) : t('no'),
        cr.deal.original.toFixed(2), dealText(g), g.recurring?t('yes'):t('no'),
        cr.deal.saved.toFixed(2), cr.deal.final.toFixed(2), (g.items||'').trim()
      ]);
    });
    var x=totals();
    rows.push([]);
    rows.push([t('grandTotal'),'','', '', '', '', '','','','']);
    rows.push([t('kBefore'),'','', '', '', '', '', '', x.total.toFixed(2),'']);
    if(x.extraSaved>0) rows.push([t('extraRow')+' ('+extraLabel(x)+')','','', '', '', '', '', x.extraSaved.toFixed(2), '','']);
    rows.push([t('kSaved'),'','', '', '', '', '', x.saved.toFixed(2), '','']);
    rows.push([t('kPay'),'','', '', '', '', '', '', x.final.toFixed(2),'']);
    var csv = rows.map(function(r){
      return r.map(function(c){
        c=String(c==null?'':c);
        return /[",\n]/.test(c) ? '"'+c.replace(/"/g,'""')+'"' : c;
      }).join(',');
    }).join('\n');
    var blob=new Blob(["﻿"+csv], {type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='shopping-tally.csv'; document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    toast(t('exported'));
  }

  function copySummary(){
    var x=totals();
    var lines=[t('sumTitle')];
    state.forEach(function(g){
      var cr = catResult(g);
      lines.push('• '+(g.name||'')+': '+money(cr.deal.original)+' → '+money(cr.deal.final)+'  '+t('sumSaved', money(cr.deal.saved)));
    });
    if(x.extraSaved>0) lines.push(t('sumExtra', money(x.extraSaved))+' ('+extraLabel(x)+')');
    lines.push('');
    lines.push(t('sBefore')+' '+money(x.total));
    lines.push(t('sSaved')+' '+money(x.saved));
    lines.push(t('sPay')+' '+money(x.final));
    var text=lines.join('\n');
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){toast(t('copied'));},
        function(){ legacyCopy(text); });
    } else { legacyCopy(text); }
  }
  function legacyCopy(text){
    var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
    ta.select(); try{document.execCommand('copy'); toast(t('copied'));}catch(e){toast(t('copyFail'));}
    document.body.removeChild(ta);
  }

  function clearAll(){
    if(!window.confirm(t('confirmClear'))) return;
    try{ localStorage.removeItem(DATA_KEY); }catch(e){}
    state=[]; seq=0; extraType='percent'; extraValue='';
    var et=document.getElementById('extraType'); if(et) et.value='percent';
    var ep=document.getElementById('extraVal'); if(ep) ep.value='';
    addGroup({name:t('firstCat')});
  }

  document.getElementById('addGroup').addEventListener('click', function(){ addGroup(); });
  document.getElementById('exportBtn').addEventListener('click', exportExcel);
  document.getElementById('copyBtn').addEventListener('click', copySummary);
  document.getElementById('clearBtn').addEventListener('click', clearAll);

  // ---------- PWA install ----------
  var installBtn = document.getElementById('installBtn');
  var deferredPrompt = null;
  function isStandalone(){ try{ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }catch(e){ return false; } }
  function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
  function showInstall(show){ if(installBtn) installBtn.style.display = show ? '' : 'none'; }
  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt = e; showInstall(true); });
  window.addEventListener('appinstalled', function(){ deferredPrompt = null; showInstall(false); toast(t('installedMsg')); });
  installBtn.addEventListener('click', function(){
    if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt = null; showInstall(false); }); }
    else if(isIOS()){ toast(t('installIOS')); }
  });
  if(!isStandalone() && isIOS()) showInstall(true); // iOS has no install event

  // whole-order extra discount
  var etSel = document.getElementById('extraType');
  var epInput = document.getElementById('extraVal');
  etSel.addEventListener('change', function(){
    extraType = etSel.value === 'zhe' ? 'zhe' : 'percent';
    applyStatic();
    updateGrand();
  });
  epInput.addEventListener('input', function(){ extraValue = epInput.value; updateGrand(); });

  // language segmented control
  document.getElementById('langSeg').addEventListener('click', function(e){
    var b = e.target.closest('button[data-lang]'); if(!b) return;
    lang = b.getAttribute('data-lang');
    try{ localStorage.setItem('sdc_lang', lang); }catch(e){}
    applyStatic();
    render();
  });

  // ---------- theme (dark / light toggle) ----------
  var theme = 'dark';
  function systemTheme(){
    try{ return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark'; }
    catch(e){ return 'dark'; }
  }
  function updateThemeIcon(){
    var sun=document.getElementById('iconSun'), moon=document.getElementById('iconMoon');
    if(!sun||!moon) return;
    var offerLight = (theme==='dark'); // when dark, the button offers to switch to light -> show sun
    sun.style.display  = offerLight ? 'block' : 'none';
    moon.style.display = offerLight ? 'none'  : 'block';
  }
  function setTheme(th, persist){
    theme = (th==='light') ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    if(persist){ try{ localStorage.setItem('sdc_theme', theme); }catch(e){} }
    var meta=document.getElementById('themeColor');
    if(meta) meta.setAttribute('content', theme==='light' ? '#f1f5f9' : '#0f172a');
    updateThemeIcon();
  }
  (function initTheme(){
    var stored=null; try{ stored=localStorage.getItem('sdc_theme'); }catch(e){}
    setTheme((stored==='light'||stored==='dark') ? stored : systemTheme(), false);
    try{
      if(window.matchMedia){
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e){
          var s=null; try{ s=localStorage.getItem('sdc_theme'); }catch(_){}
          if(s!=='light' && s!=='dark') setTheme(e.matches ? 'light' : 'dark', false);
        });
      }
    }catch(e){}
  })();
  document.getElementById('themeToggle').addEventListener('click', function(){
    setTheme(theme==='dark' ? 'light' : 'dark', true);
  });

  // ---------- init ----------
  applyStatic();
  var restored = load();
  etSel.value = extraType === 'zhe' ? 'zhe' : 'percent';
  epInput.value = extraValue;
  if(restored){ render(); }
  else { addGroup({name: t('firstCat')}); }
})();
</script>

<script>
// Register service worker for offline use (no-op when opened directly from a file)
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
