<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; color: #333; }
    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
    a.card .emoji { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
    a.card .name { font-size: 1.1rem; font-weight: 600; }
    a.card .desc { font-size: 0.85rem; color: #777; margin-top: 0.4rem; }
    .credit { font-size: 0.75rem; color: #ccc; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>My Apps</h1>
  <div class="cards">
    <a class="card" href="groupbuy.html">
      <span class="emoji">🛒</span>
      <div class="name">Group Order Splitter</div>
      <div class="desc">Split complex group orders with fees &amp; shipping</div>
    </a>
    <a class="card" href="sushi-split.html">
      <span class="emoji">🍣</span>
      <div class="name">Sushi Split</div>
      <div class="desc">Split a sushi bill among friends</div>
    </a>
    <a class="card" href="coupon-keeper.html">
      <span class="emoji">🎟️</span>
      <div class="name">Coupon Keeper</div>
      <div class="desc">Track and manage your coupons</div>
    </a>
  </div>
  <p class="credit">0oo.fish.oo0</p>
</body>
</html>
